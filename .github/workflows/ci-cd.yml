name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

env:
  REGISTRY: localhost:5000
  IMAGE_TAG: ${{ github.sha }}

jobs:

# LINT + TEST
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq nodejs npm

      - name: Install Python dependencies
        run: |
          pip install flake8 pytest pytest-mock httpx fastapi redis coverage

      - name: Install ESLint
        run: npm install -g eslint

      - name: Lint Python
        run: flake8 api worker --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint JavaScript
        working-directory: frontend
        run: eslint .

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Run Unit Tests (Redis mocked)
        run: |
          coverage run -m pytest api/tests
          coverage report
          coverage xml

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# BUILD (with local registry)
  build:
    runs-on: ubuntu-latest
    needs: lint-test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and push API image
        run: |
          docker build -t $REGISTRY/devops-api:${IMAGE_TAG} -t $REGISTRY/devops-api:latest ./api
          docker push $REGISTRY/devops-api:${IMAGE_TAG}
          docker push $REGISTRY/devops-api:latest

      - name: Build and push Worker image
        run: |
          docker build -t $REGISTRY/devops-worker:${IMAGE_TAG} -t $REGISTRY/devops-worker:latest ./worker
          docker push $REGISTRY/devops-worker:${IMAGE_TAG}
          docker push $REGISTRY/devops-worker:latest

      - name: Build and push Frontend image
        run: |
          docker build -t $REGISTRY/devops-frontend:${IMAGE_TAG} -t $REGISTRY/devops-frontend:latest ./frontend
          docker push $REGISTRY/devops-frontend:${IMAGE_TAG}
          docker push $REGISTRY/devops-frontend:latest


# SECURITY SCAN (SELF-CONTAINED)
  scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build images for scanning (CI-safe)
        run: |
          docker build -t devops-api:${IMAGE_TAG} ./api
          docker build -t devops-worker:${IMAGE_TAG} ./worker
          docker build -t devops-frontend:${IMAGE_TAG} ./frontend
      - name: Show CVEs (table) for debugging
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --severity CRITICAL --ignore-unfixed \
            --format table devops-api:${IMAGE_TAG} || true
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --severity CRITICAL --ignore-unfixed \
            --format table devops-worker:${IMAGE_TAG} || true
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --severity CRITICAL --ignore-unfixed \
            --format table devops-frontend:${IMAGE_TAG} || true


      - name: Scan API (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-api:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan Worker (Trivy)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-worker:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan Frontend (Trivy)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-frontend:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload SARIF API
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api

      - name: Upload SARIF Worker
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-worker.sarif
          category: trivy-worker

      - name: Upload SARIF Frontend
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-frontend


# INTEGRATION TEST
  integration:
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start stack
        run: |
          export REDIS_PASSWORD=defaultpass
          export REDIS_HOST=redis
          export REDIS_PORT=6379
          docker compose up -d --build
          sleep 5

      - name: Wait API health
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && exit 0
            sleep 2
          done
          echo "API health failed"
          exit 1

      - name: Verify frontend
        run: |
          curl -sf http://localhost:3000 || exit 1

      - name: Run integration test
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | jq -r '.job_id')

          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r '.status')
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done

          echo "Job failed"
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v


# DEPLOY (ROLLING UPDATE - 60s SAFE)
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build API image for deployment
        run: |
          docker build -t devops-api:${IMAGE_TAG} ./api

      - name: Rolling update deployment
        run: |
          set -e

          NETWORK="bridge"

          OLD_CONTAINER=$(docker compose ps -q api || true)

          echo "Starting new container..."

          NEW_CONTAINER=$(docker run -d \
            --network $NETWORK \
            -e REDIS_HOST=redis \
            -e REDIS_PORT=6379 \
            -e REDIS_PASSWORD=defaultpass \
            devops-api:${IMAGE_TAG})

          echo "Waiting for health check (max 60s)..."

          SUCCESS=0

          for i in {1..30}; do
            STATUS=$(docker inspect -f '{{.State.Health.Status}}' $NEW_CONTAINER 2>/dev/null || echo "starting")

            if [ "$STATUS" = "healthy" ]; then
              SUCCESS=1
              break
            fi

            sleep 2
          done

          if [ "$SUCCESS" -ne 1 ]; then
            echo "Rollback: health check failed"
            docker stop $NEW_CONTAINER || true
            docker rm $NEW_CONTAINER || true
            exit 1
          fi

          echo "Stopping old container"
          if [ -n "$OLD_CONTAINER" ]; then
            docker stop $OLD_CONTAINER || true
            docker rm $OLD_CONTAINER || true
          fi

          echo "Deployment successful"