name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

env:
  REGISTRY: localhost:5000
  IMAGE_TAG: ${{ github.sha }}

jobs:

# LINT

  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq nodejs npm

      - name: Install Python dependencies
        run: |
          pip install flake8 pytest pytest-mock httpx fastapi redis coverage

      - name: Install JS linter (eslint)
        run: |
          npm install -g eslint

      - name: Lint Python (flake8)
        run: flake8 api worker --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint JavaScript (eslint)
        run: eslint frontend || true

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

# TEST

      - name: Run Unit Tests with Coverage
        run: |
          coverage run -m pytest api/tests
          coverage report
          coverage xml

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# 3. BUILD + PUSH
  build:
    runs-on: ubuntu-latest
    needs: lint-test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build API (sha + latest)
        run: |
          docker build -t $REGISTRY/devops-api:$IMAGE_TAG -t $REGISTRY/devops-api:latest ./api
          docker push $REGISTRY/devops-api:$IMAGE_TAG
          docker push $REGISTRY/devops-api:latest

      - name: Build Worker (sha + latest)
        run: |
          docker build -t $REGISTRY/devops-worker:$IMAGE_TAG -t $REGISTRY/devops-worker:latest ./worker
          docker push $REGISTRY/devops-worker:$IMAGE_TAG
          docker push $REGISTRY/devops-worker:latest

      - name: Build Frontend (sha + latest)
        run: |
          docker build -t $REGISTRY/devops-frontend:$IMAGE_TAG -t $REGISTRY/devops-frontend:latest ./frontend
          docker push $REGISTRY/devops-frontend:$IMAGE_TAG
          docker push $REGISTRY/devops-frontend:latest


# SECURITY SCAN

  scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Trivy Scan API Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/devops-api:${{ env.IMAGE_TAG }}"
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          ignore-unfixed: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif


# INTEGRATION TEST

  integration:
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Stack
        run: docker compose up -d --build

      - name: Wait for API Health
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8000/health && exit 0
            sleep 2
          done
          exit 1

      - name: Run Integration Test
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | jq -r '.job_id')

          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r '.status')
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done

          exit 1

      - name: Tear Down
        if: always()
        run: docker compose down -v


# DEPLOY

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Stack
        run: docker compose up -d --build

      - name: Rolling Update Simulation
        run: |
          NETWORK=$(docker network ls --format "{{.Name}}" | grep internal | head -n 1)

          NEW=$(docker run -d \
            --network $NETWORK \
            -e REDIS_HOST=redis \
            -e REDIS_PORT=6379 \
            -e REDIS_PASSWORD=${REDIS_PASSWORD:-iloveredis} \
            $REGISTRY/devops-api:$IMAGE_TAG)

          for i in {1..30}; do
            HEALTH=$(docker inspect -f '{{.State.Health.Status}}' $NEW 2>/dev/null || echo starting)

            if [ "$HEALTH" = "healthy" ]; then
              OLD=$(docker compose ps -q api)
              docker stop $OLD && docker rm $OLD
              exit 0
            fi

            sleep 2
          done

          docker stop $NEW
          docker rm $NEW
          exit 1