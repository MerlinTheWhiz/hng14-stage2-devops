name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:

env:
  REGISTRY: localhost:5000
  IMAGE_TAG: ${{ github.sha }}

jobs:

# LINT + TEST
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq nodejs npm

      - name: Install Python dependencies
        run: |
          pip install flake8 pytest pytest-mock httpx fastapi redis coverage

      - name: Install ESLint
        run: npm install -g eslint

      - name: Lint Python
        run: flake8 api worker --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint JS
        run: eslint frontend || true

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

      - name: Run Unit Tests
        run: |
          coverage run -m pytest api/tests
          coverage report
          coverage xml

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


# BUILD
  build:
    runs-on: ubuntu-latest
    needs: lint-test

    steps:
      - uses: actions/checkout@v4

      - name: Build API
        run: |
          docker build -t devops-api:${IMAGE_TAG} -t devops-api:latest ./api

      - name: Build Worker
        run: |
          docker build -t devops-worker:${IMAGE_TAG} -t devops-worker:latest ./worker

      - name: Build Frontend
        run: |
          docker build -t devops-frontend:${IMAGE_TAG} -t devops-frontend:latest ./frontend


# SECURITY SCAN
  scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build images again for scan (required)
        run: |
          docker build -t devops-api:${IMAGE_TAG} ./api
          docker build -t devops-worker:${IMAGE_TAG} ./worker
          docker build -t devops-frontend:${IMAGE_TAG} ./frontend

      - name: Scan API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-api:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL

      - name: Scan Worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-worker:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL

      - name: Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devops-frontend:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL

      - name: Upload SARIF API
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif


# INTEGRATION TEST
  integration:
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait API health
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8000/health && exit 0
            sleep 2
          done
          exit 1

      - name: Run integration test
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | jq -r '.job_id')

          for i in {1..20}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r '.status')
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done

          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v


# DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Rolling update (safe check)
